<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Agent — UZ/RU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14161a;
    --bg-elevated: #1c1f26;
    --bg-input: #21242c;
    --border: #2a2e38;
    --text: #edeef0;
    --text-dim: #8b91a1;
    --text-faint: #565b68;
    --accent: #5b8def;
    --accent-dim: #3d5fa3;
    --source: #4ade80;
    --latency: #f5a623;
    --error: #f56565;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ---------- Left rail ---------- */
  .rail {
    width: 320px;
    min-width: 320px;
    background: var(--bg-elevated);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px;
  }

  .brand {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .brand-sub {
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 32px;
  }

  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(91, 141, 239, 0.06);
  }

  .dropzone-icon {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .dropzone-label {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .dropzone-label strong {
    color: var(--text);
    font-weight: 500;
  }

  input[type="file"] { display: none; }

  .doc-status {
    margin-top: 20px;
    display: none;
  }

  .doc-status.visible { display: block; }

  .doc-card {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .doc-card-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .doc-card-row:last-child { margin-bottom: 0; }

  .doc-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .doc-value {
    font-size: 12px;
    color: var(--text);
    text-align: right;
    max-width: 190px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .doc-value.chunks {
    font-family: var(--mono);
    color: var(--source);
  }

  .status-line {
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    display: none;
  }

  .status-line.visible { display: block; }
  .status-line.error { color: var(--error); }

  .rail-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1.6;
  }

  /* ---------- Main chat area ---------- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .chat-header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    justify-content: center;
  }

  .mode-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
  }

  .mode-btn {
    background: transparent;
    border: none;
    border-radius: 7px;
    padding: 7px 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    transition: background 0.15s ease;
  }

  .mode-btn:hover { background: rgba(255, 255, 255, 0.03); }

  .mode-btn.active {
    background: var(--accent);
  }

  .mode-btn-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .mode-btn.active .mode-btn-label { color: #0f1115; }

  .mode-btn-sub {
    font-size: 10px;
    color: var(--text-faint);
  }

  .mode-btn.active .mode-btn-sub { color: rgba(15, 17, 21, 0.65); }

  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 40px 0;
  }

  .chat-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--text-faint);
    padding: 0 24px;
  }

  .empty-state-glyph {
    font-family: var(--mono);
    font-size: 32px;
    color: var(--border);
    margin-bottom: 16px;
  }

  .empty-state h2 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .empty-state p {
    font-size: 13px;
    max-width: 320px;
    line-height: 1.6;
  }

  .msg {
    margin-bottom: 28px;
  }

  .msg-question {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 500;
    margin-bottom: 12px;
    padding-left: 14px;
    border-left: 2px solid var(--accent-dim);
  }

  .msg-answer {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }

  .msg-meta {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .trace-strip {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-faint);
    display: flex;
    gap: 10px;
    letter-spacing: 0.01em;
  }

  .trace-strip .t-val { color: var(--latency); }

  .sources {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .source-chip {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--source);
    background: rgba(74, 222, 128, 0.08);
    border: 1px solid rgba(74, 222, 128, 0.2);
    border-radius: 4px;
    padding: 2px 7px;
  }

  .lang-chip {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  .msg-error {
    font-size: 13.5px;
    color: var(--error);
    background: rgba(245, 101, 101, 0.08);
    border: 1px solid rgba(245, 101, 101, 0.2);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .thinking {
    display: flex;
    gap: 4px;
    padding-left: 2px;
  }

  .thinking span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-faint);
    animation: pulse 1.1s infinite ease-in-out;
  }

  .thinking span:nth-child(2) { animation-delay: 0.15s; }
  .thinking span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.25; transform: scale(0.85); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* ---------- Input bar ---------- */
  .input-bar {
    border-top: 1px solid var(--border);
    padding: 16px 24px 20px;
    background: var(--bg);
  }

  .input-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 140px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-faint); }
  textarea:disabled { opacity: 0.5; cursor: not-allowed; }

  .send-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 42px;
    height: 42px;
    min-width: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, opacity 0.15s ease;
  }

  .send-btn:hover:not(:disabled) { background: #6b9aff; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .send-btn svg { width: 17px; height: 17px; }

  /* ---------- Scrollbar ---------- */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 720px) {
    .rail { width: 260px; min-width: 260px; padding: 18px; }
    .chat-inner, .input-inner { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<div class="rail">
  <div class="brand">RAG Agent</div>
  <div class="brand-sub">Мультиязычный поиск по документам · UZ / RU</div>

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">⌘</div>
    <div class="dropzone-label"><strong>Загрузи документ</strong><br>PDF, DOCX или TXT</div>
    <input type="file" id="fileInput" accept=".pdf,.docx,.txt">
  </div>

  <div class="doc-status" id="docStatus">
    <div class="doc-card">
      <div class="doc-card-row">
        <span class="doc-label">Файл</span>
        <span class="doc-value" id="docFilename">—</span>
      </div>
      <div class="doc-card-row">
        <span class="doc-label">Чанков</span>
        <span class="doc-value chunks" id="docChunks">—</span>
      </div>
    </div>
  </div>

  <div class="status-line" id="statusLine"></div>

  <div class="rail-footer">
    API: <span id="apiUrlDisplay">localhost:8000</span>
  </div>
</div>

<div class="main">
  <div class="chat-header">
    <div class="mode-toggle" id="modeToggle">
      <button class="mode-btn active" data-mode="rag">
        <span class="mode-btn-label">RAG</span>
        <span class="mode-btn-sub">только факты из документа</span>
      </button>
      <button class="mode-btn" data-mode="chat">
        <span class="mode-btn-label">Chat</span>
        <span class="mode-btn-sub">обсуждение, оценки, советы</span>
      </button>
    </div>
  </div>

  <div class="chat-scroll" id="chatScroll">
    <div class="chat-inner" id="chatInner">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-glyph">→</div>
        <h2>Загрузи документ, чтобы начать</h2>
        <p>После загрузки можно задавать вопросы на узбекском или русском — ответы будут со ссылкой на источник в документе.</p>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-inner">
      <textarea
        id="questionInput"
        placeholder="Задай вопрос по документу..."
        rows="1"
        disabled
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f1115" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:8000';
  document.getElementById('apiUrlDisplay').textContent = API_URL.replace('http://', '');

  let documentId = null;
  let currentMode = 'rag';

  const modeToggle = document.getElementById('modeToggle');
  modeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    currentMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    questionInput.placeholder = currentMode === 'chat'
      ? 'Спроси мнение, оценку, совет по документу...'
      : 'Задай вопрос по документу...';
  });

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const docStatus = document.getElementById('docStatus');
  const docFilename = document.getElementById('docFilename');
  const docChunks = document.getElementById('docChunks');
  const statusLine = document.getElementById('statusLine');
  const questionInput = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn');
  const chatInner = document.getElementById('chatInner');
  const chatScroll = document.getElementById('chatScroll');
  const emptyState = document.getElementById('emptyState');

  // ---- Upload handling ----

  dropzone.addEventListener('click', () => fileInput.click());

  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });

  dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('dragover');
  });

  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      uploadFile(e.dataTransfer.files[0]);
    }
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
      uploadFile(fileInput.files[0]);
    }
  });

  function setStatus(text, isError = false) {
    statusLine.textContent = text;
    statusLine.classList.add('visible');
    statusLine.classList.toggle('error', isError);
  }

  function clearStatus() {
    statusLine.classList.remove('visible');
  }

  async function uploadFile(file) {
    setStatus('> загрузка и индексация...');
    docStatus.classList.remove('visible');
    questionInput.disabled = true;
    sendBtn.disabled = true;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${API_URL}/upload`, {
        method: 'POST',
        body: formData,
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Неизвестная ошибка' }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      documentId = data.document_id;

      docFilename.textContent = data.filename;
      docFilename.title = data.filename;
      docChunks.textContent = data.num_chunks;
      docStatus.classList.add('visible');

      clearStatus();
      questionInput.disabled = false;
      sendBtn.disabled = false;
      questionInput.focus();

      emptyState.innerHTML = `
        <div class="empty-state-glyph">✓</div>
        <h2>Документ проиндексирован</h2>
        <p>${data.num_chunks} фрагментов готовы к поиску. Задай вопрос на узбекском или русском.</p>
      `;
    } catch (err) {
      setStatus(`✕ ошибка: ${err.message}`, true);
    }
  }

  // ---- Question handling ----

  questionInput.addEventListener('input', () => {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 140) + 'px';
  });

  questionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  sendBtn.addEventListener('click', sendQuestion);

  async function sendQuestion() {
    const question = questionInput.value.trim();
    if (!question || !documentId) return;

    if (emptyState) {
      emptyState.remove();
    }

    const questionEl = document.createElement('div');
    questionEl.className = 'msg';
    questionEl.innerHTML = `<div class="msg-question">${escapeHtml(question)}</div>`;
    chatInner.appendChild(questionEl);

    const answerWrapper = document.createElement('div');
    answerWrapper.className = 'msg';
    answerWrapper.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    chatInner.appendChild(answerWrapper);

    chatScroll.scrollTop = chatScroll.scrollHeight;

    questionInput.value = '';
    questionInput.style.height = 'auto';
    questionInput.disabled = true;
    sendBtn.disabled = true;

    try {
      const res = await fetch(`${API_URL}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ document_id: documentId, question, mode: currentMode }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Неизвестная ошибка' }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();

      const sourcesHtml = data.sources.map(s =>
        `<span class="source-chip">${escapeHtml(s.filename)} · стр. ${s.page}</span>`
      ).join('');

      answerWrapper.innerHTML = `
        <div class="msg-answer">${escapeHtml(data.answer)}</div>
        <div class="msg-meta">
          <div class="trace-strip">
            <span>retrieval <span class="t-val">${Math.round(data.latency_ms)}ms</span></span>
          </div>
          <span class="lang-chip">${data.detected_language} · ${currentMode}</span>
        </div>
        <div class="sources" style="margin-top: 8px;">${sourcesHtml}</div>
      `;
    } catch (err) {
      answerWrapper.innerHTML = `<div class="msg-error">Ошибка: ${escapeHtml(err.message)}</div>`;
    } finally {
      questionInput.disabled = false;
      sendBtn.disabled = false;
      questionInput.focus();
      chatScroll.scrollTop = chatScroll.scrollHeight;
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
